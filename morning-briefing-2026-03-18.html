<script>
(function() {
  'use strict';

  // --- Config ---
  var SB_URL = 'https://cvmexkjdadiseccaavzr.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2bWV4a2pkYWRpc2VjY2FhdnpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MjY5MjksImV4cCI6MjA4ODIwMjkyOX0.nPizSXPmXQAXnJP2CfD_20Z2gSc_wR6sFE76GAn1bqM';
  var PORTAL = 'https://ucwh-report-portal.netlify.app';

  var sb = null;
  var isIframe = false;

  try { isIframe = window.self !== window.top; } catch(e) { isIframe = true; }

  // ========================================
  // PATH 1: Inside portal iframe — postMessage handshake
  // ========================================
  if (isIframe) {
    var verified = false;
    var timeout = setTimeout(function() {
      if (!verified) {
        // Fail open when inside an iframe — the portal already handles auth.
        document.body.classList.add('ucwh-authed');
      }
    }, 3000);

    window.addEventListener('message', function(ev) {
      if (ev.origin !== PORTAL) return;
      if (ev.data && ev.data.type === 'ucwh-auth-verified') {
        verified = true;
        clearTimeout(timeout);
        document.body.classList.add('ucwh-authed');
      }
    });

    try { window.parent.postMessage({ type: 'ucwh-auth-check' }, PORTAL); } catch(e) {}
    return;
  }

  // ========================================
  // PATH 2: Direct URL access
  // ========================================
  function init() {
    try {
      if (window.supabase && window.supabase.createClient) {
        sb = window.supabase.createClient(SB_URL, SB_KEY);
      }
    } catch(e) { /* ignore */ }

    if (!sb) {
      // SDK failed — redirect to portal instead of showing broken page
      redirectToPortal();
      return;
    }

    // Check for OAuth redirect tokens in the URL hash
    var hasAuthHash = window.location.hash && (
      window.location.hash.indexOf('access_token') !== -1 ||
      window.location.hash.indexOf('refresh_token') !== -1
    );

    if (hasAuthHash) {
      sb.auth.onAuthStateChange(function(event, session) {
        if (event === 'SIGNED_IN' && session && session.user && session.user.email) {
          verifyUser(session.user.email);
        }
      });
      setTimeout(function() {
        sb.auth.getSession().then(function(res) {
          var session = res.data && res.data.session;
          if (session && session.user && session.user.email) {
            verifyUser(session.user.email);
          } else {
            redirectToPortal();
          }
        }).catch(function() {
          document.body.classList.add('ucwh-authed');
        });
      }, 2000);
    } else {
      // Normal page load — check existing session on this origin
      sb.auth.getSession().then(function(res) {
        var session = res.data && res.data.session;
        if (session && session.user && session.user.email) {
          verifyUser(session.user.email);
        } else {
          // No session on GitHub Pages — redirect to portal
          redirectToPortal();
        }
      }).catch(function() {
        document.body.classList.add('ucwh-authed');
      });
    }
  }

  function verifyUser(email) {
    sb.from('report_portal_users')
      .select('email,role')
      .eq('email', email)
      .single()
      .then(function(res) {
        if (res.data) {
          document.body.classList.add('ucwh-authed');
          if (window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
            try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch(e) {}
          }
        } else {
          accessDenied(email);
        }
      }).catch(function() {
        accessDenied(email);
      });
  }

  function redirectToPortal() {
    // Build a deep link to the portal that auto-opens this report.
    // Format: portal/#deeplink/<encoded-url>
    // The portal will open the report in its authenticated iframe viewer.
    var reportUrl = window.location.href;
    var slug = window.location.pathname.split('/').pop().replace('.html', '');
    var deepLink = PORTAL + '/#deeplink/' + encodeURIComponent(reportUrl);
    window.location.replace(deepLink);
  }

  function accessDenied(email) {
    document.body.classList.add('ucwh-login-visible');

    var overlay = document.createElement('div');
    overlay.id = 'ucwh-login-overlay';
    overlay.style.cssText = 'min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1e293b 100%);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999999';

    var box = document.createElement('div');
    box.style.cssText = 'background:#1e293b;border-radius:16px;padding:40px;width:420px;max-width:90vw;box-shadow:0 20px 80px rgba(0,0,0,0.4);text-align:center;border:1px solid #334155';
    box.innerHTML = '<div style="font-size:48px;margin-bottom:16px">&#128274;</div>'
      + '<h1 style="font-size:24px;font-weight:800;color:#f1f5f9;margin:0 0 6px">Access Denied</h1>'
      + '<p style="font-size:14px;color:#94a3b8;margin:0 0 8px">Your account (<strong style="color:#f1f5f9">' + email + '</strong>) does not have access to this report.</p>'
      + '<p style="font-size:13px;color:#64748b;margin:0 0 20px">Contact your administrator to request access.</p>'
      + '<a href="' + PORTAL + '" style="display:inline-block;padding:10px 20px;border:1px solid #334155;border-radius:8px;background:#273548;color:#f1f5f9;text-decoration:none;font-size:14px;font-weight:600">Go to Portal</a>';

    overlay.appendChild(box);

    while (document.body.firstChild) document.body.removeChild(document.body.firstChild);
    document.body.appendChild(overlay);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
